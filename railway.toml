# ── Azmera API — Railway deployment configuration ─────────────────
# Docs: https://docs.railway.app/reference/config-as-code
#
# Deploy steps:
#   1. Connect this repo on https://railway.app
#   2. Set environment variables in Railway dashboard:
#        ALLOWED_ORIGINS=https://<your-app>.vercel.app
#        OPENAI_API_KEY=<your-key>          (for advisory text)
#        CDSAPI_KEY=<your-key>              (optional — CHIRPS only)
#   3. Railway auto-detects Python and runs the build/start commands below.

[build]
builder = "nixpacks"
buildCommand = "pip install -r api/requirements.txt"

[deploy]
startCommand = "uvicorn api.server:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/docs"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
